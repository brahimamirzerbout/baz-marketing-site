<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <!-- BAZ LinkedIn Banner — 1584×396 -->
  <!-- Ink background, wordmark left, violet accent line -->
  <defs>
    <radialGradient id="li-mesh" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0e0e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="#0e0e0e"/>
  <rect width="1584" height="396" fill="url(#li-mesh)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="80" y1="0" x2="80" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="880" y1="0" x2="880" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1040" y1="0" x2="1040" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1280" y1="0" x2="1280" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1360" y1="0" x2="1360" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1440" y1="0" x2="1440" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1520" y1="0" x2="1520" y2="396" stroke="#f5f1ea" stroke-width="0.5"/>
  </g>

  <!-- Violet accent line -->
  <rect x="80" y="310" width="120" height="2" fill="#8b5cf6" rx="1"/>

  <!-- BAZ Wordmark -->
  <text x="80" y="220" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="300" fill="#f5f1ea" letter-spacing="-3">BAZ</text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="400" fill="#737373" letter-spacing="1.5">MARKETING VENTURES AGENCY</text>

  <!-- Tagline -->
  <text x="80" y="300" font-family="Fraunces, Georgia, serif" font-size="24" font-weight="400" fill="#a3a3a3" letter-spacing="-0.5">Powering Your Path To Growth</text>

  <!-- Mark — right side -->
  <g transform="translate(1420, 160)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="#8b5cf6"/>
    <text x="40" y="60" font-family="Fraunces, Georgia, serif" font-size="62" font-weight="600" fill="#f5f1ea" text-anchor="middle" letter-spacing="-2">B</text>
  </g>
</svg>