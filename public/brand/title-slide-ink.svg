<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- BAZ Presentation Title Slide — 1920×1080 -->
  <!-- Ink background, violet accent, editorial layout -->

  <defs>
    <radialGradient id="title-mesh" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0e0e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ink background -->
  <rect width="1920" height="1080" fill="#0e0e0e"/>
  <rect width="1920" height="1080" fill="url(#title-mesh)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="80" y1="0" x2="80" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="880" y1="0" x2="880" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1040" y1="0" x2="1040" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1280" y1="0" x2="1280" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1360" y1="0" x2="1360" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1440" y1="0" x2="1440" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1520" y1="0" x2="1520" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1600" y1="0" x2="1600" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1680" y1="0" x2="1680" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1760" y1="0" x2="1760" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1840" y1="0" x2="1840" y2="1080" stroke="#f5f1ea" stroke-width="0.5"/>
  </g>

  <!-- Section label eyebrow -->
  <text x="160" y="380" font-family="JetBrains Mono, monospace" font-size="13" font-weight="400" fill="#8b5cf6" letter-spacing="2.5" text-transform="uppercase">● PRESENTATION TITLE</text>

  <!-- Main title -->
  <text x="160" y="520" font-family="Fraunces, Georgia, serif" font-size="96" font-weight="300" fill="#f5f1ea" letter-spacing="-4">Presentation Title</text>

  <!-- Subtitle -->
  <text x="160" y="600" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#737373" letter-spacing="0">Subtitle or date goes here</text>

  <!-- Violet accent line -->
  <rect x="160" y="660" width="160" height="2" fill="#8b5cf6" rx="1"/>

  <!-- Mark — bottom right -->
  <g transform="translate(1750, 950)">
    <rect x="0" y="0" width="50" height="50" rx="11" fill="#8b5cf6" opacity="0.15"/>
    <text x="25" y="38" font-family="Fraunces, Georgia, serif" font-size="40" font-weight="600" fill="#8b5cf6" opacity="0.15" text-anchor="middle" letter-spacing="-1.5">B</text>
  </g>
</svg>