<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <!-- BAZ X/Twitter Header — 1500×500 -->
  <!-- Ink background, paper wordmark, minimal -->
  <defs>
    <radialGradient id="tw-mesh" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0e0e0e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#0e0e0e"/>
  <rect width="1500" height="500" fill="url(#tw-mesh)"/>

  <!-- Grid -->
  <g opacity="0.03">
    <line x1="80" y1="0" x2="80" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="560" y1="0" x2="560" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="880" y1="0" x2="880" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1040" y1="0" x2="1040" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1280" y1="0" x2="1280" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1360" y1="0" x2="1360" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
    <line x1="1440" y1="0" x2="1440" y2="500" stroke="#f5f1ea" stroke-width="0.5"/>
  </g>

  <!-- BAZ Wordmark -->
  <text x="80" y="280" font-family="Fraunces, Georgia, serif" font-size="64" font-weight="300" fill="#f5f1ea" letter-spacing="-3">BAZ</text>

  <!-- Subtitle -->
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#737373" letter-spacing="2">MARKETING VENTURES AGENCY</text>

  <!-- Accent line -->
  <rect x="80" y="370" width="120" height="2" fill="#8b5cf6" rx="1"/>

  <!-- Tagline -->
  <text x="80" y="410" font-family="Fraunces, Georgia, serif" font-size="20" font-weight="400" fill="#a3a3a3" letter-spacing="-0.5">Powering Your Path To Growth</text>

  <!-- Mark -->
  <g transform="translate(1360, 370)">
    <rect x="0" y="0" width="60" height="60" rx="13" fill="#8b5cf6"/>
    <text x="30" y="46" font-family="Fraunces, Georgia, serif" font-size="46" font-weight="600" fill="#f5f1ea" text-anchor="middle" letter-spacing="-1.5">B</text>
  </g>
</svg>