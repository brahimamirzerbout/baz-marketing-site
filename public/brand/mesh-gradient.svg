<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- BAZ Mesh Gradient — Radial violet glow for ink/dark backgrounds -->
  <!-- Use as overlay with opacity 0.08-0.15 -->
  <defs>
    <radialGradient id="mesh1" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh2" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#mesh1)"/>
  <rect width="400" height="400" fill="url(#mesh2)"/>
</svg>