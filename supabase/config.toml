project_id = "baz-marketing"
managed = false

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54323
major_version = 17

[db.pooler]
enabled = true
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://uyqgmdrzyapbbvmaumvk.supabase.co"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "per_worker"

[storage]
enabled = true

[storage.buckets.brand]
public = true
file_size_limit = 10485760
allowed_mime_types = ["image/png", "image/jpeg", "image/svg+xml", "image/webp"]

[storage.buckets.leads]
public = false
file_size_limit = 5242880
allowed_mime_types = ["image/png", "image/jpeg", "application/pdf"]
